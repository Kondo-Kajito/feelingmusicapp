<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeling Music App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-container">
        <header>
            <h1>Feeling Music</h1>
            <p>今の気持ちを入力してください。AIがあなたに寄り添う音楽とメッセージを提案します。</p>
        </header>
        
        <section class="form-section">
            <input type="text" id="feeling-input" placeholder="例：今日はとても楽しい！">
            
            <div class="preference-group" style="display: flex; gap: 10px; width: 100%; margin-bottom: 1rem;">
                <select id="genre-input" style="flex: 1; padding: 1rem; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; background-color: white;">
                    <option value="">ジャンル（選択なし）</option>
                    <option value="J-POP">J-POP</option>
                    <option value="ロック">ロック</option>
                    <option value="ジャズ">ジャズ</option>
                    <option value="アニメソング">アニソン</option>
                    <option value="クラシック">クラシック</option>
                </select>
                <input type="text" id="artist-input" placeholder="好きな歌手（任意）" style="flex: 1; margin-bottom: 0; padding: 1rem;">
            </div>

            <button id="submit-button" onclick="analyzeFeeling()">AIに相談する</button>
        </section>

        <section id="result-section" style="display:none;">
            <div class="result-card">
                <p id="emotion-message" style="color: #5c6ac4; font-weight: bold; white-space: pre-wrap;"></p>
                
                <img id="album-art" src="" style="display:none; width: 120px; border-radius: 8px; margin: 15px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                
                <div class="song-title" id="song-title">楽曲名が表示されます</div>
                <div class="artist-name" id="artist-name">アーティスト名</div>
                
                <audio id="audio-player" controls style="display:none; width: 100%; margin-top: 15px;"></audio>
                
                <p id="music-error" style="display:none; color: #e53e3e; font-size: 14px; margin-top: 10px;">※楽曲の試聴データが見つかりませんでした。</p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
